[tools]
python = { version = "3.10", virtualenv = ".venv" }

[env]
PYTHONPATH = "./scripts"
VIRTUAL_ENV = ".venv"

[tasks.test]
description = "Run tests"
run = "python -m pytest tests/ -v"

[tasks.test-coverage]
description = "Run tests with coverage"
run = "python -m pytest tests/ --cov=scripts --cov-report=term-missing --cov-report=html"

[tasks.install]
description = "Install dependencies"
run = "pip install -r requirements.txt"

[tasks.dev]
description = "Install development dependencies"
run = "pip install -r requirements.txt && pip install pytest pytest-cov pytest-mock black pylint mypy"

[tasks.format]
description = "Format code with black"
run = "black scripts/ tests/"

[tasks.lint]
description = "Lint code with pylint"
run = "pylint scripts/"

[tasks.check]
description = "Run type checking with mypy"
run = "mypy scripts/"
