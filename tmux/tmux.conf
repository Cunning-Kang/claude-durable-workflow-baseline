# Task 1 baseline tmux configuration
set -g @session_model "main-side-ops"
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 5
set -g status-left "#S"
set -g status-right "%Y-%m-%d %H:%M"

# Task 2: quick key to create main/side/ops sessions
bind-key C-v run-shell 'REPO="#{environ:TMUX_REPO_ROOT}"; if [ -z "$REPO" ]; then tmux display-message "TMUX_REPO_ROOT is required"; exit 1; fi; bash "$REPO/tmux/scripts/create-vibe-sessions.sh" "#{socket_path}" "sc"'

# Task 4: plugin upgrade ports (reserved, default off)
set -g @port_recovery "off"
set -g @port_navigation "off"
set -g @port_logging "off"
set -g @port_statusline "off"

if-shell '[ -n "#{environ:TMUX_REPO_ROOT}" ]' 'source-file "#{environ:TMUX_REPO_ROOT}/tmux/ports/plugins-recovery.conf"'
if-shell '[ -n "#{environ:TMUX_REPO_ROOT}" ]' 'source-file "#{environ:TMUX_REPO_ROOT}/tmux/ports/plugins-navigation.conf"'
if-shell '[ -n "#{environ:TMUX_REPO_ROOT}" ]' 'source-file "#{environ:TMUX_REPO_ROOT}/tmux/ports/plugins-logging.conf"'
if-shell '[ -n "#{environ:TMUX_REPO_ROOT}" ]' 'source-file "#{environ:TMUX_REPO_ROOT}/tmux/ports/plugins-statusline.conf"'
